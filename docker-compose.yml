version: '3.8'

services:
  econutri-api:
    build: .
    container_name: econutri_api_container
    command: ["uvicorn", "src.cloud_api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      # Cloud API chỉ cần file models AI (weights)
      - ./weights:/app/weights
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1